<!DOCTYPE html>
<html>
<head>
	<title>Mithran</title>
<style>
body
{
    margin: 0;
    padding: 0;
    font-family: Bitter;
    background-color:black;
}
.navbar
{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background-color:black;
    height: 8vh;
    position: relative;
}
.navbar::after
{
        content:"";
        position:absolute;
        bottom:0;
        left:0;
        width:100%;
        height: 0.9px;
        background:ghostwhite;
        box-shadow: 0 0 30px rgba(212, 175, 55, 1);
}
.logo-box {
  cursor: pointer;
  display: inline-block;
  position: relative;
  width: 0px;
  height: 0px;
}

/* Logo */
.logo-img {
   width: 40px;
    height: 36px;
    object-fit: fit; 
    margin-top: -10px; /* moves down */ 
    margin-left: 700px; /* moves right */
  transition:1.9s ease;
}

/* Text Layer */
.logo-text {
    position: absolute;
    width: 180px;
    height: 50px;
    object-fit: fit; 
    margin-top: -50px; /* moves down */ 
    margin-left: 635px; /* moves right */

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 22px;
  letter-spacing: 2px;
  color: white;
transition: 3s ease;
  border-radius: 20px;
  opacity: 0;
  transform: scale(0.8);

}

.logo-box:hover .logo-img {
  opacity: 0.2;
  filter: blur(4px);
}

.logo-box:hover .logo-text {
  opacity: 1;
  transform: scale(2);

}

/* Letter animation */
.logo-box:hover .logo-text span {
  animation: reveal 1s forwards;
}

/* Delay for each letter */
.logo-text span:nth-child(1) { animation-delay: 0.05s; }
.logo-text span:nth-child(2) { animation-delay: 0.1s; }
.logo-text span:nth-child(3) { animation-delay: 0.15s; }
.logo-text span:nth-child(4) { animation-delay: 0.2s; }
.logo-text span:nth-child(5) { animation-delay: 0.25s; }
.logo-text span:nth-child(6) { animation-delay: 0.3s; }
.logo-text span:nth-child(7) { animation-delay: 0.35s; }

@keyframes reveal {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.menu-icon-container 
{
    display: inline-block;
    cursor: pointer;
    padding: 10px; 
    background-color: transparent; 
    position: fixed; 
    top: 18px;
    left: 10px; 
    z-index: 1000;
}

.bar1, .bar2, .bar3 
{
    width: 20px; 
    height: 2px; 
    background-color: #fff; 
    margin: 6px 0; 
    transition: 0.4s; 
}
</style>
</head>
<body>
<div class="navbar">
    <div class="menu-icon-container">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
    </div>
    <div class="logo-box">
        <center><img src="logo.png" class="logo-img"></center>
        <div class="logo-text">
        <span>M I T H R A N</span>
    </div>
</div>       
<div class="chatbot">
    <a></a>
</div>
</div>
</body>
</html>
