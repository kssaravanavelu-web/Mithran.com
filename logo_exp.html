<!DOCTYPE html>
<html>
<head>
    <title>Mithran</title>

<style>
body
{
    margin: 0;
    padding: 0;
    font-family: Bitter;
    background-color:black;
}

.navbar
{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background-color:black;
    height: 8vh;
    position: relative;
}

.navbar::after
{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height: 0.9px;
    background:ghostwhite;
    box-shadow: 0 0 30px rgba(212, 175, 55, 1);
}

/* chatbot */
.chatbot
{
    width: 70px;
    height: 75px;
    border-radius: 100%; 
    object-fit: cover;
    margin-top: 1px;
    margin-left: 8px;
}

/* bottom text */
.text
{
    color:silver;
    width: 280px;
    height: 50px;
    object-fit: cover;
    margin-top: 280px;
    margin-left:630px;
    font-size:45px;
}

/* logo container */
.logo-box {
  cursor: pointer;
  display: inline-block;
  position: relative;
  width: 40px;
  height: 36px;
}

/* logo image */
.logo-img {
    width: 48px;
    height: 36px;
    object-fit: cover;
    margin-top: 12px;
    margin-left: 730px;
    transition:1.9s ease;
}

/* text over logo */
.logo-text {
    position: absolute;
    width: 180px;
    height: 50px;
    object-fit: cover;
    margin-top: -43px;
    margin-left: 630px;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 22px;
    letter-spacing: 2px;
    color: white;

    transition: 3s ease;
    border-radius: 20px;
    opacity: 0;
    transform: scale(0.8);

    pointer-events: none;
}

/* hover ONLY on logo image */
.logo-img:hover {
  opacity: 0.2;
  filter: blur(4px);
}

/* trigger text only when logo is hovered */
.logo-img:hover + .logo-text {
  opacity: 1;
  transform: scale(2);
}

/* letters base */
.logo-text span {
  opacity: 0;
  display: inline-block;
  transform: translateY(10px);
}

/* animation trigger ONLY when hovering logo */
.logo-img:hover + .logo-text span {
  animation: reveal 1s forwards;
}

/* delays */
.logo-text span:nth-child(1) { animation-delay: 0.05s; }
.logo-text span:nth-child(2) { animation-delay: 0.1s; }
.logo-text span:nth-child(3) { animation-delay: 0.15s; }
.logo-text span:nth-child(4) { animation-delay: 0.2s; }
.logo-text span:nth-child(5) { animation-delay: 0.25s; }
.logo-text span:nth-child(6) { animation-delay: 0.3s; }
.logo-text span:nth-child(7) { animation-delay: 0.35s; }

@keyframes reveal {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="navbar">

    <div class="logo-box">
        <center><img src="logo.png" class="logo-img"></center>

        <div class="logo-text">
            <span>M</span>
            <span>I</span>
            <span>T</span>
            <span>H</span>
            <span>R</span>
            <span>A</span>
            <span>N</span>
        </div>
    </div>       

    <div class="chatbot">
        <a><img src="chatbot.png" class="chatbot"></a>
    </div>

</div>

<div class="text">
    <center><p>M I T H R A N</p></center>
</div>

</body>
</html>
