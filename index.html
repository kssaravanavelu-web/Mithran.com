<!DOCTYPE html>
<html>
<head>
<title>Mithran</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Bitter;
    background-color: black;
    overflow: hidden;
    height: 100vh;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
    animation: fadeOut 1s ease forwards;
    animation-delay: 2.2s;
}

.loader img {
    width: 80px;
    animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
    0% { transform: scale(0.5); opacity: 0; filter: blur(10px);}
    100% { transform: scale(1); opacity: 1; filter: blur(0);}
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* PAGE */
.page {
    opacity: 0;
    transform: scale(1.2);
    animation: pageZoom 1.5s ease forwards;
    animation-delay: 2.3s;
}

@keyframes pageZoom {
    to { opacity: 1; transform: scale(1); }
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 8vh;
    position: relative;
}

.menu-btn {
    position: absolute;
    left: 20px;
    font-size: 28px;
    color: silver;
    cursor: pointer;
}

/* LOGO */
.logo-box {
    position: relative;
}

.logo-img {
    width: 40px;
    height: 36px;
    margin-top: 10px;
    transition: 0.5s;
}

.logo-text {
    position: absolute;
    top: 30px;
    left: 25px;
    transform: translate(-50%, -50%) scale(0.8);
    font-size: 22px;
    color: white;
    opacity: 0;
    transition: 0.5s;
}

.logo-img:hover {
    opacity: 0.2;
    filter: blur(4px);
}

.logo-img:hover + .logo-text {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
}

/* MODERN SIDEBAR */
.sidebar {
    position: fixed;
    top: 20px;
    left: -500px;
    width: 380px;
    height: 90%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(40px);
    border-radius: 30px;
    padding: 40px 20px;
    transition: 0.6s cubic-bezier(0.77,0,0.18,1);
    z-index: 1000;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

.sidebar.active {
    left: 20px;
}

/* MENU ITEMS */
.sidebar a {
    display: block;
    padding: 18px 20px;
    margin: 10px 0;
    color: white;
    text-decoration: none;
    font-size: 20px;
    border-radius: 12px;
    opacity: 0;
    transform: translateX(-30px);
}

/* HOVER EFFECT */
.sidebar a:hover {
    background: rgba(255,255,255,0.15);
    transform: translateX(10px);
}

/* STAGGER ANIMATION */
.sidebar.active a {
    animation: slideIn 0.5s forwards;
}

.sidebar.active a:nth-child(1){ animation-delay: 0.2s;}
.sidebar.active a:nth-child(2){ animation-delay: 0.4s;}
.sidebar.active a:nth-child(3){ animation-delay: 0.6s;}
.sidebar.active a:nth-child(4){ animation-delay: 0.8s;}

@keyframes slideIn {
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* TEXT */
.quotes {
    color:silver;
    margin-top:200px;
    text-align:center;
    font-size:25px;
    opacity: 0;
    transform: translateY(50px);
    animation: textFade 1s ease forwards;
    animation-delay: 2.8s;
}

@keyframes textFade {
    to { opacity: 1; transform: translateY(0); }
}

/* BUTTON */
.btn {
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 15px;
    width: 180px;
    height: 45px;
    background: transparent;
    color: silver;
    border: none;
    box-shadow:0 0 5px silver;
    cursor:pointer;
    transition:0.4s;
}

.btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px silver;
}
</style>
</head>

<body>

<div class="loader">
    <img src="logo.png">
</div>

<div class="page">

<div class="navbar">
    <div class="menu-btn" id="menuBtn">☰</div>

    <div class="logo-box">
        <img src="logo.png" class="logo-img">
        <div class="logo-text">MITHRAN</div>
    </div>
</div>

<!-- MODERN SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Report</a>
    <a href="#">Login</a>
</div>

<div class="overlay" id="overlay"></div>

<div class="quotes">
    <p>Welcome To Mithran, Explore Schemes In Mithran Get Benefited And Be Successful</p>
</div>

<div style="margin-top:100px; display:flex; justify-content:center;">
   <a href="Explore.html">
       <button class="btn">Explore More</button>
   </a>
</div>

</div>

<script>
const btn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

btn.onclick = function() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");

    btn.innerHTML = sidebar.classList.contains("active") ? "✕" : "☰";
};

overlay.onclick = function() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    btn.innerHTML = "☰";
};
</script>

</body>
</html>
