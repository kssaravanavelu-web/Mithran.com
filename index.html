<!DOCTYPE html>
<html>
<head>
<title>Mithran</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Bitter;
    background-color: black;
    overflow: hidden;
    height: 100vh;
    background-repeat:no-repeat;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
    animation: fadeOut 1s ease forwards;
    animation-delay: 2.2s;
}

.loader img {
    width: 80px;
    animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
    0% { transform: scale(0.5); opacity: 0; filter: blur(10px);}
    100% { transform: scale(1); opacity: 1; filter: blur(0);}
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* PAGE */
.page {
    opacity: 0;
    transform: scale(1.2);
    animation: pageZoom 1.5s ease forwards;
    animation-delay: 2.3s;
}

@keyframes pageZoom {
    to { opacity: 1; transform: scale(1); }
}

/* NAVBAR */
.navbar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 8vh;
    position: relative;
}

.navbar::after {
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:1px;
    background:white;
    box-shadow: 0 0 20px silver;
}

/* MENU BUTTON */
.menu-btn {
    position: absolute;
    left: 15px;
    font-size: 26px;
    color: silver;
    cursor: pointer;
    user-select: none;
}

/* LOGO */
.logo-box {
    position: relative;
}

.logo-img {
    width: 40px;
    height: 36px;
    margin-top: 10px;
    transition:2s ease;
}

.logo-text {
    position: absolute;
    top: 30px;
    left: 25px;
    transform: translate(-50%, -50%) scale(0.8);
    font-size: 22px;
    color: white;
    opacity: 0;
    pointer-events: none;
    transition:2s ease;
}

.logo-img:hover {
    opacity: 0.2;
    filter: blur(4px);
}

.logo-img:hover + .logo-text {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.5);
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: -270px;
    width: 450px;
    height: 140%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(35px);
    padding-top: 100px;
    transition: 1s ease;
    z-index: 1000;
}

.sidebar.active {
    left: 0;
}

.sidebar a {
    display: block;
    padding: 18px 25px;
    color: white;
    text-decoration: none;
    font-size: 18px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* TEXT */
.quotes {
    color:silver;
    margin-top:200px;
    text-align:center;
    font-size:25px;
    opacity: 0;
    transform: translateY(50px);
    animation: textFade 1s ease forwards;
    animation-delay: 2.8s;
}

@keyframes textFade {
    to { opacity: 1; transform: translateY(0); }
}

/* BUTTON */
.btn {
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 15px;
    width: 180px;
    height: 45px;
    background: transparent;
    color: silver;
    border: none;
    box-shadow:0 0 5px silver;
    cursor:pointer;
    transition:0.4s;
}

.btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 15px silver;
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader">
    <img src="logo.png">
</div>

<div class="page">

<!-- NAVBAR -->
<div class="navbar">
    <div class="menu-btn" id="menuBtn">☰</div>

    <div class="logo-box">
        <img src="logo.png" class="logo-img">
        <div class="logo-text">MITHRAN</div>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Report</a>
    <a href="#">Login</a>
</div>

<div class="overlay" id="overlay"></div>

<!-- CONTENT -->
<div class="quotes">
    <p>Welcome To Mithran, Explore Schemes In Mithran Get Benefited And Be Successful</p>
</div>

<div style="margin-top:100px; display:flex; justify-content:center;">
   <a href="Explore.html">
       <button class="btn">Explore More</button>
   </a>
</div>

</div>

<script>
const btn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

btn.onclick = function() {
    sidebar.classList.toggle("active");
    overlay.classList.toggle("active");

    if (sidebar.classList.contains("active")) {
        btn.innerHTML = "✕";
    } else {
        btn.innerHTML = "☰";
    }
};

overlay.onclick = function() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    btn.innerHTML = "☰";
};
</script>

</body>
</html>
