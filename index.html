<!DOCTYPE html>
<html>
<head>
<title>Mithran</title>

<style>
body
{
    margin: 0;
    padding: 0;
    font-family: Bitter;
    background-color:black;
    overflow: hidden;
}

/*  LOADER SCREEN */
.loader
{
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
    animation: fadeOut 1s ease forwards;
    animation-delay: 2.2s;
}

.loader img
{
    width: 80px;
    animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal
{
    0% { transform: scale(0.5); opacity: 0; filter: blur(10px);}
    100% { transform: scale(1); opacity: 1; filter: blur(0);}
}

@keyframes fadeOut
{
    to { opacity: 0; visibility: hidden; }
}

/* PAGE ENTRY */
.page
{
    opacity: 0;
    transform: scale(1.2);
    animation: pageZoom 1.5s ease forwards;
    animation-delay: 2.3s;
}

@keyframes pageZoom
{
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* NAVBAR */
.navbar
{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    background-color:black;
    height: 8vh;
    position: relative;
}
.navbar::after
{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height: 0.9px;
    background:ghostwhite;
    box-shadow: 0 0 30px rgba(212, 175, 55, 1);
}

/* LOGO */
.logo-box {
  cursor: pointer;
  position: relative;
}
.logo-img {
   width: 40px;
    height: 36px;
    object-fit: fit; 
    margin-top: 10px; 
    margin-left: 730px;
  transition:2s ease;
}

.logo-text {
    position: absolute;
    margin-top: -30px;
    margin-left: 700px;
    font-size: 22px;
    color: white;
    opacity: 0;
    transform: scale(0.8);
    transition:2.5s;
}

.logo-box:hover .logo-img {
  opacity: 0.2;
  filter: blur(4px);
}
.logo-box:hover .logo-text {
  opacity: 1;
  transform: scale(2);
}

/* MENU ICON */
.menu-icon-container 
{
    position: fixed; 
    top: 18px;
    left: 10px; 
}
.bar1, .bar2, .bar3 
{
    width: 20px; 
    height: 2px; 
    background-color: #fff; 
    margin: 6px 0; 
}

/* TEXT ENTRY */
.quotes
{
    color:silver;
    margin-top:200px;
    margin-left:340px;
    font-size:25px;

    opacity: 0;
    transform: translateY(50px);
    animation: textFade 1s ease forwards;
    animation-delay: 2.8s;
}

@keyframes textFade
{
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON */
.btn {
    padding: 12px 28px;
    border: none;
    border-radius: 50px; /* smooth edges */
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    width: 180px;        /* same width for all buttons */
    height: 45px;        /* same height */
    text-align: center;
    box-shadow:0 0 5px silver;
    background-color:transparent;
    color:silver;
}

@keyframes btnFade
{
    to {
        opacity: 1;
        transform: translateY(3px);
    }
}
.btn:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 15px silver;
}
.btn:active
{
    transform: translateY(2px) scale(0.97);
    
    box-shadow: 
        0 2px 5px silver,
        inset 0 3px 8px silver;

    filter: brightness(0.9);
}
</style>
</head>

<body>
<--loder-->
<div class="loader">
    <img src="logo.png">
</div>

<!-- MAIN PAGE -->
<div class="page">

<div class="navbar">
<div class="menu-icon-container">
    <div class="bar1"></div>
    <div class="bar2"></div>
    <div class="bar3"></div>
</div>

<div class="logo-box">
  <img src="logo.png" class="logo-img">
  <div class="logo-text">MITHRAN</div>
</div>

</div>

<div class="quotes">
    <p>Welcome To Mithran , Explore Schemes In Mithran Get Benifited And be Successful</p>
</div>

<div style="margin-top:100px; margin-left:675px;">
    <button class="btn">Explore More</button>
</div>

</div>

<script>
/* ENABLE SCROLL AFTER LOAD */
setTimeout(() => {
    document.body.style.overflow = "auto";
}, 3500);
</script>

</body>
</html>
