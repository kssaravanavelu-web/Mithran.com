<!DOCTYPE html>
<html>
<head>
    <title>Mithran</title>
<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Cinzel', serif;
    background-color:black;
    caret-color: transparent;
}
.navbar
{
    display: flex;
    align-items: center;
    justify-content: center;
    height: 8vh;
    position: fixed;
    width: 100%;
    z-index: 999;
    background:transparent;
    backdrop-filter: blur(12px);
    top: 0%;
    left: 0%;

}
.navbar::after 
 {
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:0.6px;
    background:white;
    box-shadow: 0 0 20px white;
}
.menu-icon-container {
    position: absolute;
    left: 20px;
    top: 18px;
    cursor: pointer;
    z-index: 1001;
}
.bar1,.bar2,.bar3{
    width:20px;
    height:2px;
    background:white;
    margin:4px 0;
}

/* 🔥 LOGO FIXED */
.logo-box {
    position: relative;
    width: 180px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-img {
    width: 40px;
    height: 36px;
    position: absolute;
    transition: 0.4s ease;
}

.logo-text {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 20px;
    font-family:montserrat;
    letter-spacing: 2px; 
    color: white;
    opacity: 0;
    transition: 0.4s ease;
}

/* HOVER EFFECT */
.logo-box:hover .logo-img {
    opacity: 0;
}
.logo-box:hover .logo-text {
    opacity: 1;
}

/* MENU */
.menu-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 30%;
    height: 100vh;
    background:background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    backdrop-filter: blur(5px);
    transform: translateX(-100%);
    transition: transform 0.7s cubic-bezier(0.77,0,0.175,1);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 60px;

}
.menu-panel.active {
    transform: translateX(0);
}

.menu-content {
    text-align: right;
}
.menu-content a {
    display: block;
    font-size: 18px;
    color:mintcream;
    margin: 20px 0;
    text-decoration: none;
    letter-spacing: 3px;
    transition: 0.3s;
}
.menu-content a:hover {
    opacity: 0.6;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 28px;
    color: white;
    cursor: pointer;
}
 :root { --primary: #27ae60; --bg: #121212; --card-bg: #1e1e1e; --text: #eee; }
body 
{ 
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 900px;
    margin: 20px auto;
    padding: 20px; 
}
.container 
{ 
    background: var(--card-bg);
    padding: 30px; 
    border-radius: 15px;
    margin-top:20%;
    margin-left:1%;
    border: 1px solid #333;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
        
h1 
{ 
    text-align: center;
    color:whitesmoke;
    margin-bottom: 50px;
    text-transform: uppercase;
    letter-spacing: 2px; }
label 
{ 
    font-size: 11px; 
    color: #888; 
    text-transform: uppercase; 
    display: block; 
    margin-top: 40px; 
    font-weight: bold; 
    letter-spacing: 1px; 
}
        
select, input 
{ 
    width: 100%; 
    padding: 12px; 
    margin-top: 5px; 
    border-radius: 8px; 
    border: 1px solid #444; 
    background: #2a2a2a; 
    color: white; 
    font-size: 15px; 
    box-sizing: border-box; 
    transition: 0.3s; 
}
select:focus, input:focus 
{ 
    border-color: var(--primary); 
    outline: none; 
    box-shadow: 0 0 8px rgba(39,174,96,0.2); 
}

.filter-section 
{ 
    display: none; 
    padding: 20px; 
    background: #1a2634; 
    border-radius: 10px; 
    margin-top: 20px; 
    border-left: 4px solid var(--primary); 
}
.filter-section h3 
{ 
    margin-top: 0; 
    color: var(--primary); 
    font-size: 1.1em; 
    margin-bottom: 15px; 
}

.card 
{ 
    background: #252525; 
    padding: 20px; 
    margin-top: 40px; 
    border-radius: 10px; 
    border-left: 5px solid var(--primary); 
    animation: fadeIn 0.4s ease; 
}
@keyframes fadeIn 
{ 
    from 
    { 
        opacity: 0; 
        transform: translateY(10px);
    } 
    to 
    { 
        opacity: 1;
        transform: translateY(0); 
    } 
}
        
.card h3 
{ 
    color: var(--primary);
    margin: 0 0 10px 0;
    border-bottom: 1px solid #333; 
    padding-bottom: 8px; 
    font-size: 1.2em; 
}
.card p 
{ 
    margin: 6px 0; 
    font-size: 13px; 
    display: flex; 
    justify-content: space-between; 
    border-bottom: 1px solid #2d2d2d; 
    padding-bottom: 4px; 
}
.card b 
{ 
    color: #888; 
    text-transform: capitalize; 
    font-weight: 500; 
}
        
.error-msg 
{ 
    color: #ff5555; 
    background: #3a1a1a; 
    padding: 15px; 
    border-radius: 8px; 
    margin-top: 15px; 
    border: 1px solid #552222; 
    text-align: center; 
}
.loading-text 
{ 
    text-align: center; 
    color: #666; 
    padding: 20px; 
    font-style: italic; 
}
</style>
</head>
<body>
<div class="navbar">
    <div class="menu-icon-container" onclick="openMenu()">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
    </div>

    <!-- 🔥 FIXED LOGO -->
    <div class="logo-box">
        <img src="logo1.png" class="logo-img">
        <div class="logo-text">M I T H R A N</div>
    </div>
</div>

<div class="menu-panel" id="menu">
    <div class="close-btn" onclick="closeMenu()">✕</div>
    <div class="menu-content">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Report</a>
        <a href="#">Login</a>
    </div>
</div>
<div class="container">
    <h1>MITHRAN Finder</h1>

    <label>1. Who are you?</label>
    <select id="category">
        <option value="">-- Loading Categories --</option>
    </select>

    <label>2. Searching for?</label>
    <select id="type">
        <option value="loan">Loans</option>
        <option value="schemes">Schemes</option>
    </select>

   <div id="section-farmer" class="filter-section">
        <h3>Farmer Land & Community</h3>
        <label>Land Size (Acres)</label>
        <input type="number" id="land" placeholder="Enter acres (e.g. 2.5)" step="0.1">
        <label>Community</label>
        <select id="farmer_caste">
            <option value="">All Communities</option>
            <option value="BC">BC</option><option value="MBC">MBC</option>
            <option value="SC">SC</option><option value="ST">ST</option>
        </select>
    </div>

    <div id="section-student" class="filter-section">
        <h3>Student Details</h3>
        <label>Gender</label>
        <select id="gender">
            <option value="">Any Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <label>Quota Selection</label>
        <select id="quota">
            <option value="">Any Quota</option>
            <option value="Government">Government Quota</option>
            <option value="Management">Management Quota</option>
        </select>
        <label>Community</label>
        <select id="student_caste">
            <option value="">All Communities</option>
            <option value="BC">BC</option><option value="MBC">MBC</option>
            <option value="SC">SC</option><option value="ST">ST</option>
        </select>
    </div>

    <div id="results"></div>
</div>
<script>
    function openMenu(){
    document.getElementById("menu").classList.add("active");
}
function closeMenu(){
    document.getElementById("menu").classList.remove("active");
}
const supabaseClient = window.supabase.createClient(
    'https://zzgnllfalopyjibndbui.supabase.co',
    'sb_publishable_XLjmJXavBRRkjv6HpBz7Cg_z7BIS29m'
);

// Load Categories from Database
async function loadCategories() {
    const { data } = await supabaseClient.from('CATEGORIES').select('*');
    const catDrop = document.getElementById("category");
    if (data) {
        catDrop.innerHTML = '<option value="">-- Select Category --</option>';
        data.forEach(c => {
            let opt = document.createElement("option");
            opt.value = c.id; opt.textContent = c.name;
            catDrop.appendChild(opt);
        });
    }
}
loadCategories();

// Main Logic
async function performSearch() {
    const catId = document.getElementById("category").value;
    const tableName = document.getElementById("type").value;
    const resDiv = document.getElementById("results");

    if (!catId) return;

    resDiv.innerHTML = "<p class='loading-text'>Searching database...</p>";

    // Handle the specific 'schemes' table column name with space seen in your screenshot
    const landMaxCol = (tableName === "schemes") ? "max_land in" : "max_land";

    let query = supabaseClient.from(tableName).select('*').eq('category_id', catId);

    const isFarmer = document.getElementById("section-farmer").style.display === "block";
    const isStudent = document.getElementById("section-student").style.display === "block";

    if (isFarmer) {
        const land = document.getElementById("land").value;
        const caste = document.getElementById("farmer_caste").value;
        if (land !== "") {
            const num = parseFloat(land);
            query = query.lte('min_land', num).gte(landMaxCol, num);
        }
        if (caste) query = query.ilike('caste', %${caste}%);
    }

    if (isStudent) {
        const gender = document.getElementById("gender").value;
        const caste = document.getElementById("student_caste").value;
        const quotaVal = document.getElementById("quota").value;

        // FIXED: Using ilike with wildcards for better matching
        if (gender) query = query.ilike('gender', %${gender}%);
        if (caste) query = query.ilike('caste', %${caste}%);
        
        // ADDED: Quota Filtration (matching against 'quoata' column typo in your DB)
        if (quotaVal) query = query.ilike('quoata', %${quotaVal}%);
    }

    const { data, error } = await query;

    if (error) {
        resDiv.innerHTML = <div class="error-msg"><b>Error:</b> ${error.message}</div>;
        return;
    }

    renderUI(data, tableName);
}

function renderUI(data, table) {
    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "";

    if (!data || data.length === 0) {
        resDiv.innerHTML = <p class='loading-text'>No matching ${table}s found.</p>;
        return;
    }

    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        const title = item.loan_name || item.scheme_name || "Entry";
        
        let html = <h3>${title}</h3>;
        for (let key in item) {
            if (item[key] && !['id','category_id','created_at'].includes(key)) {
                // Clean display for the keys
                let displayKey = key.replace(/_/g, ' ').replace('in', '').trim();
                html += <p><b>${displayKey}:</b> <span>${item[key]}</span></p>;
            }
        }
        card.innerHTML = html;
        resDiv.appendChild(card);
    });
}

// Logic to show/hide filter sections based on chosen category
document.getElementById("category").addEventListener("change", function() {
    const text = this.options[this.selectedIndex].text.toLowerCase();
    document.getElementById("section-farmer").style.display = text.includes("farmer") ? "block" : "none";
    document.getElementById("section-student").style.display = text.includes("student") ? "block" : "none";
    performSearch();
});

// Refresh on any input change
document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('change', performSearch);
    el.addEventListener('input', performSearch);
});
</script>
</body>
</html>
