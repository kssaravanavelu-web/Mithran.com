<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITHRAN Finder Pro</title>
    <style>
        :root { --primary: #27ae60; --bg: #121212; --card-bg: #1e1e1e; --text: #eee; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 950px; margin: 20px auto; padding: 20px; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 15px; font-weight: bold; }
        
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 15px; box-sizing: border-box; }
        select:focus, input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 8px rgba(39,174,96,0.2); }

        .filter-section { display: none; padding: 20px; background: #1a2634; border-radius: 10px; margin-top: 20px; border-left: 4px solid var(--primary); animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
        
        .filter-section h3 { margin-top: 0; color: var(--primary); font-size: 1.1em; margin-bottom: 15px; }

        #results { margin-top: 30px; }
        .card { background: #252525; padding: 20px; margin-top: 15px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .card h3 { color: var(--primary); margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 8px; font-size: 1.2em; }
        .card p { margin: 6px 0; font-size: 13px; display: flex; justify-content: space-between; border-bottom: 1px solid #2d2d2d; padding-bottom: 4px; }
        .card b { color: #888; text-transform: capitalize; font-weight: 500; }
        
        .error-msg { color: #ff5555; background: #3a1a1a; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #552222; }
        .info-text { text-align: center; color: #666; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>MITHRAN Finder</h1>

    <label>1. Who are you?</label>
    <select id="category">
        <option value="">-- Select Category --</option>
    </select>

    <label>2. Searching for?</label>
    <select id="type">
        <option value="loan">Loans</option>
        <option value="schemes">Schemes</option>
    </select>

    <div id="section-farmer" class="filter-section">
        <h3>Farmer Land & Community</h3>
        <label>Land Size (Acres)</label>
        <input type="number" id="land" placeholder="Enter acres (e.g. 2.5)" step="0.1">
        <label>Community</label>
        <select id="farmer_caste">
            <option value="">All Communities</option>
            <option value="BC">BC</option><option value="MBC">MBC</option>
            <option value="SC">SC</option><option value="ST">ST</option>
        </select>
    </div>

    <div id="section-student" class="filter-section">
        <h3>Student Details</h3>
        <label>Gender</label>
        <select id="gender">
            <option value="">Any Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <label>Quota Selection</label>
        <select id="quota">
            <option value="">Any Quota</option>
            <option value="Government">Government Quota</option>
            <option value="Management">Management Quota</option>
        </select>
        <label>Community</label>
        <select id="student_caste">
            <option value="">All Communities</option>
            <option value="BC">BC</option><option value="MBC">MBC</option>
            <option value="SC">SC</option><option value="ST">ST</option>
        </select>
    </div>

    <div id="section-widow" class="filter-section">
        <h3>Widow / Destitute Details</h3>
        <label>Specific Status</label>
        <select id="widow_status">
            <option value="">All Statuses</option>
            <option value="Widow">Widow</option>
            <option value="Destitute">Destitute Woman</option>
            <option value="Deserted">Deserted Wife</option>
        </select>
        <label>Community</label>
        <select id="widow_caste">
            <option value="">All Communities</option>
            <option value="BC">BC</option><option value="MBC">MBC</option>
            <option value="SC">SC</option><option value="ST">ST</option>
        </select>
    </div>

    <div id="results"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = window.supabase.createClient(
    'https://zzgnllfalopyjibndbui.supabase.co',
    'sb_publishable_XLjmJXavBRRkjv6HpBz7Cg_z7BIS29m'
);

async function loadCategories() {
    const { data } = await supabaseClient.from('CATEGORIES').select('*');
    const catDrop = document.getElementById("category");
    if (data) {
        catDrop.innerHTML = '<option value="">-- Select Category --</option>';
        data.forEach(c => {
            let opt = document.createElement("option");
            opt.value = c.id; opt.textContent = c.name;
            catDrop.appendChild(opt);
        });
    }
}
loadCategories();

async function performSearch() {
    const catId = document.getElementById("category").value;
    const tableName = document.getElementById("type").value;
    const resDiv = document.getElementById("results");

    if (!catId) return;

    resDiv.innerHTML = "<p class='info-text'>Fetching matches...</p>";

    // Column Mapping for known DB quirks
    const landMaxCol = (tableName === "schemes") ? "max_land in" : "max_land";

    let query = supabaseClient.from(tableName).select('*').eq('category_id', catId);

    // Section Visibilities
    const isFarmer = document.getElementById("section-farmer").style.display === "block";
    const isStudent = document.getElementById("section-student").style.display === "block";
    const isWidow = document.getElementById("section-widow").style.display === "block";

    // 1. Farmer Logic
    if (isFarmer) {
        const land = document.getElementById("land").value;
        const caste = document.getElementById("farmer_caste").value;
        if (land !== "") {
            const num = parseFloat(land);
            query = query.lte('min_land', num).gte(landMaxCol, num);
        }
        if (caste) query = query.ilike('caste', `%${caste}%`);
    }

    // 2. Student Logic
    if (isStudent) {
        const gender = document.getElementById("gender").value;
        const caste = document.getElementById("student_caste").value;
        const quota = document.getElementById("quota").value;
        if (gender) query = query.ilike('gender', `%${gender}%`);
        if (caste) query = query.ilike('caste', `%${caste}%`);
        if (quota) query = query.ilike('quoata', `%${quota}%`);
    }

    // 3. Widow Logic (Searching Target_Audience)
    if (isWidow) {
        const status = document.getElementById("widow_status").value;
        const caste = document.getElementById("widow_caste").value;
        if (status) query = query.ilike('Target_Audience', `%${status}%`);
        if (caste) query = query.ilike('caste', `%${caste}%`);
    }

    const { data, error } = await query;

    if (error) {
        resDiv.innerHTML = `<div class="error-msg"><b>Error:</b> ${error.message}</div>`;
        return;
    }

    renderUI(data);
}

function renderUI(data) {
    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "";

    if (!data || data.length === 0) {
        resDiv.innerHTML = "<p class='info-text'>No matching records found.</p>";
        return;
    }

    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        const title = item.loan_name || item.scheme_name || "Entry";
        
        let html = `<h3>${title}</h3>`;
        for (let key in item) {
            if (item[key] && !['id','category_id','created_at'].includes(key)) {
                let displayKey = key.replace(/_/g, ' ').replace('in', '').trim();
                html += `<p><b>${displayKey}:</b> <span>${item[key]}</span></p>`;
            }
        }
        card.innerHTML = html;
        resDiv.appendChild(card);
    });
}

// Category Toggle Logic
document.getElementById("category").addEventListener("change", function() {
    const text = this.options[this.selectedIndex].text.toLowerCase();
    
    // Hide all
    document.getElementById("section-farmer").style.display = "none";
    document.getElementById("section-student").style.display = "none";
    document.getElementById("section-widow").style.display = "none";

    // Show selected
    if (text.includes("farmer")) document.getElementById("section-farmer").style.display = "block";
    else if (text.includes("student")) document.getElementById("section-student").style.display = "block";
    else if (text.includes("widow") || text.includes("woman")) document.getElementById("section-widow").style.display = "block";
    
    performSearch();
});

// Update on change
document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('change', performSearch);
    el.addEventListener('input', performSearch);
});

</script>
</body>
</html>
